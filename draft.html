<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  </head>
  <body class="p-20 bg-slate-400">
    <!-- dropdown -->
    <div id="avatar-container" class="max-w-md">
      <button
        id="avatarBtn"
        onclick="
          document.querySelector(`#dropdown-header`).toggleClass('hidden')
        "
      >
        S
      </button>
      <div
        class="dropdown flex flex-col bg-white overflow-hidden rounded-3xl"
        id="dropdown"
      >
        <div id="dropdown-header" class="px-6 py-3">
          <h2 id="dropdown-name" class="text-2xl font-bold">Sample User</h2>
          <h2 id="dropdown-email" class="text-stone-500">sample@email.com</h2>
        </div>
        <div
          class="dropdown-items flex flex-col divide-y divide-gray-300 text-xl font-semibold"
        >
          <a
            href="#"
            class="dropdown-item flex items-center hover:bg-orange-100 gap-3 hover:text-orange-600 px-6 py-3"
          >
            <svg
              width="15"
              height="15"
              stroke="currentColor"
              fill="none"
              stroke-width="2.5"
            >
              <use href="/svg/icons.svg#profile" />
            </svg>
            Profile
          </a>
          <a
            href="#"
            class="dropdown-item flex items-center hover:bg-orange-100 gap-3 hover:text-orange-600 px-6 py-3"
          >
            <svg
              width="15"
              height="15"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2.5"
            >
              <use href="/svg/icons.svg#settings" />
            </svg>
            Settings
          </a>
          <a
            href="#"
            id="logoutBtn"
            class="dropdown-item flex items-center hover:bg-orange-100 gap-3 text-orange-600 px-6 py-3"
          >
            <svg
              width="15"
              height="15"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2.5"
            >
              <use href="/svg/icons.svg#logout" />
            </svg>
            Log out
          </a>
        </div>
      </div>
    </div>
  </body>
</html>
