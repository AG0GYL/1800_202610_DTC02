<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Personal Profile</title>
    <!-- libraries -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <!-- components -->
    <script src="../src/navbar.js" type="module"></script>
    <script src="../src/createvenue.js" type="module" defer></script>
</head>

<body>
    <!-- navbar -->
    <site-navbar></site-navbar>

    <main>
        <!-- create venue form -->
        <div class="grid justify-items-center container mx-auto px-4 py-8">
            <h1 class="text-3xl font-bold mb-6">Create a New Venue</h1>
            <form id="createVenueForm" class="space-y-6 max-w-lg w-full">
                <div>
                    <label for="venueName" class="block text-sm font-medium text-gray-700">Venue Name</label>
                    <input type="text" id="venueName" name="venueName" required
                        class="mt-1 block w-full border border-gray-300 rounded-md shadow-sm p-2 focus:ring-orange-500 focus:border-orange-500">
                </div>
                <div>
                    <label for="venueDescription" class="block text-sm font-medium text-gray-700">Description</label>
                    <textarea id="venueDescription" name="venueDescription" rows="4" required
                        class="mt-1 block w-full border border-gray-300 rounded-md shadow-sm p-2 focus:ring-orange-500 focus:border-orange-500"></textarea>
                </div>

                <!-- Location with autocomplete -->
                <div>
                    <label for="venueLocation" class="block text-sm font-medium text-gray-700">Location
                        (Address)</label>
                    <div id="location-wrapper" class="relative mt-1">
                        <input type="text" id="venueLocation" name="venueLocation" required autocomplete="off"
                            placeholder="Start typing an address..."
                            class="block w-full border border-gray-300 rounded-md shadow-sm p-2 focus:ring-orange-500 focus:border-orange-500">
                        <ul id="autocomplete-list"
                            class="hidden absolute z-50 w-full bg-white border border-gray-300 border-t-0 rounded-b-md shadow-md max-h-56 overflow-y-auto">
                        </ul>
                    </div>
                    <input type="hidden" id="venueLat" name="venueLat">
                    <input type="hidden" id="venueLon" name="venueLon">
                </div>
                <!-- upload picture -->
                <div>
                    <p>Picture Upload</p>
                    <div id="imageDisplay">
                        <svg xmlns="http://www.w3.org/2000/svg" width="100" height="100" viewBox="0 0 24 24" fill="none"
                            stroke="#ff3b30" stroke-width="1" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M14 3v4a1 1 0 0 0 1 1h4" />
                            <path d="M17 21h-10a2 2 0 0 1 -2 -2v-14a2 2 0 0 1 2 -2h7l5 5v11a2 2 0 0 1 -2 2z" />
                            <path d="M10 18l5 -5a1.414 1.414 0 0 0 -2 -2l-5 5v2h2z" />
                        </svg>
                    </div>
                    <br>
                    <button type="button" onclick="document.getElementById('inputImage').click()"
                        class="mt-1 cursor-pointer bg-white border border-gray-300 hover:border-orange-500 hover:text-orange-600 transition text-gray-700 text-sm font-medium py-2 px-4 rounded-md">
                        Upload Pictures
                    </button>
                    <input type="file" id="inputImage" accept="image/*" multiple class="hidden">
                </div>
                <button type="submit"
                    class="bg-orange-600 hover:bg-orange-700 transition text-white font-bold py-2 px-4 rounded-md">
                    Create Venue
                </button>
            </form>
        </div>
    </main>

    <script>
    </script>

</body>

</html>
