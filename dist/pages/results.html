<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <!-- libraries -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- components -->
    <script type="module" crossorigin src="/assets/results-D42p-QTG.js"></script>
    <link rel="modulepreload" crossorigin href="/assets/navbar-KwjmcJQU.js">
    <link rel="modulepreload" crossorigin href="/assets/searchbar-CHodjZPo.js">
  </head>
  <body>
    <!-- navbar -->
    <site-navbar></site-navbar>
    <!-- searchbar -->
    <div class="max-w-6xl p-10 mx-auto space-y-5">
      <form class="flex bg-white rounded-xl w-full md:w-1/2 border">
        <input
          type="text"
          placeholder="Enter an address, neighborhood, city, or ZIP code"
          class="p-3 w-full outline-none"
          id="searchBar"
        />
        <!-- filter button -->
        <div class="w-[1px] bg-gray-400 my-2"></div>
        <button
          type="button"
          class="flex items-center gap-3 hover:bg-gray-300 px-4 hover:cursor-pointer"
          id="filterBtn"
        >
          <img src="data:image/svg+xml,%3csvg%20xmlns='http://www.w3.org/2000/svg'%20width='27'%20height='27'%20viewBox='0%200%2024%2024'%20fill='none'%20stroke='currentColor'%20stroke-width='2'%20stroke-linecap='round'%20stroke-linejoin='round'%20%3e%3cline%20x1='4'%20y1='6'%20x2='20'%20y2='6'%20/%3e%3cline%20x1='8'%20y1='12'%20x2='16'%20y2='12'%20/%3e%3cline%20x1='11'%20y1='18'%20x2='13'%20y2='18'%20/%3e%3c/svg%3e" alt="" />
        </button>
        <!-- search button -->
        <button
          type="submit"
          class="bg-orange-600 px-4 rounded-r-xl hover:cursor-pointer hover:bg-orange-500"
        >
          <img src="data:image/svg+xml,%3csvg%20width='32px'%20height='32px'%20viewBox='0%200%2024%2024'%20fill='none'%20xmlns='http://www.w3.org/2000/svg'%20%3e%3cg%20id='SVGRepo_bgCarrier'%20stroke-width='0'%3e%3c/g%3e%3cg%20id='SVGRepo_tracerCarrier'%20stroke-linecap='round'%20stroke-linejoin='round'%20%3e%3c/g%3e%3cg%20id='SVGRepo_iconCarrier'%3e%3cpath%20d='M16.6725%2016.6412L21%2021M19%2011C19%2015.4183%2015.4183%2019%2011%2019C6.58172%2019%203%2015.4183%203%2011C3%206.58172%206.58172%203%2011%203C15.4183%203%2019%206.58172%2019%2011Z'%20stroke='%23ffffff'%20stroke-width='2'%20stroke-linecap='round'%20stroke-linejoin='round'%20%3e%3c/path%3e%3c/g%3e%3c/svg%3e" alt="" />
        </button>
      </form>
      <!-- filter fields -->
      <div
        id="filterPanel"
        class="hidden absolute bg-white shadow-lg overflow-y-scroll max-h-50 rounded-lg p-4 mt-2 w-72 z-50"
      >
        <h3 class="font-bold mb-2">Filters</h3>
        <!-- venue level -->
        <label class="block mb-2">Level</label>
        <select id="levelFilter" class="w-full mb-3 border p-2 rounded">
          <option value="">Any</option>
          <option value="Chill">Chill</option>
          <option value="Moderate">Moderate</option>
          <option value="Lively">Lively</option>
          <option value="High Energy">High Energy</option>
        </select>
        <!-- group size -->
        <label class="block mb-2">Group Size</label>
        <select id="groupFilter" class="w-full border p-2 mb-3 rounded">
          <option value="">Any</option>
          <option value="Solo">Solo</option>
          <option value="Small Group">Small Group</option>
          <option value="Large Group">Large Group</option>
        </select>
        <!-- Rating -->
        <label class="block mb-2">Minimum Rating</label>

        <input
          type="range"
          id="ratingFilter"
          min="0"
          max="5"
          step="0.1"
          value="0"
          class="w-full accent-orange-500 hover: cursor-pointer"
        />

        <p class="text-sm text-gray-400 mt-1">
          <span id="ratingValue">0.0</span>+ stars
        </p>

        <!-- Pricing -->
        <label class="block mb-2">Price</label>
        <select id="priceFilter" class="w-full border p-2 rounded mb-3">
          <option value="">Any</option>
          <option value="1">$</option>
          <option value="2">$$</option>
          <option value="3">$$$</option>
        </select>

        <!-- Would Visit Again -->
        <label class="block mb-2">Visit again?</label>
        <select id="visitFilter" class="w-full border p-2 rounded mb-3">
          <option value="">Any</option>
          <option value="Yes">Yes</option>
          <option value="No">No</option>
        </select>
      </div>
      <h1></h1>
      <div id="results" class="space-y-5"></div>
    </div>

  </body>
</html>
